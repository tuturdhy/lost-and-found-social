# ================================
# APPLICATION
# ================================
spring.application.name=lost-and-found-api
server.port=8080

# ================================
# ================================
# DATABASE - MySQL (CORRIGÉ)
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/lost_and_found_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# ================================
# JPA / HIBERNATE
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Optionnel : laisse Spring Boot auto-détecter le dialecte, ou utilise :
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# ================================
# JWT
# ================================
app.jwt.secret=c2VjcmV0S2V5Rm9yTG9zdEFuZEZvdW5kQXBwbGljYXRpb25KV1RTZWNyZXRLZXkyMDI0
app.jwt.expiration=86400000

# ================================
# FILE UPLOAD
# ================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ================================
# CORS
# ================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:8081

# ================================
# LOGGING
# ================================
logging.level.com.lostandfound=DEBUG
logging.level.org.springframework.security=INFO
# ================================
# SPRING - Allow circular references (temporaire)
# ================================
spring.main.allow-circular-references=true